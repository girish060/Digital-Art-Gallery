<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <title>Creator Tab - Artify</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="auth.js"></script>
  <script src="uploadCloudinary.js"></script>
</head>

<body class="bg-gray-100 min-h-screen flex flex-col items-center py-10">

  <!-- 🔥 Custom Header -->
  <header class="fixed w-full top-0 z-50 bg-white border-b border-gray-200">
    <div class="container mx-auto flex flex-wrap p-4 flex-col md:flex-row items-center justify-between">
      <!-- Logo -->
      <a href="index.html" class="flex title-font font-bold items-center text-gray-900 mb-4 md:mb-0 group">
        <img src="https://pictures.artify.tn/app/artify_logo_xs.png" alt="Artify Logo" class="w-10 h-10 rounded-full transition-transform group-hover:scale-110">
        <span class="ml-3 text-2xl text-gradient">Artify</span>
      </a>
      
      <!-- Navigation -->
      <nav class="hidden md:flex items-center space-x-8">
        <a href="index.html" class="text-gray-700 hover:text-indigo-600 font-medium transition-colors">Home</a>
        <a href="trending.html" class="text-gray-700 hover:text-indigo-600 font-medium transition-colors">Trending</a>
        <a href="artworks.html" class="text-gray-700 hover:text-indigo-600 font-medium transition-colors">Artworks</a>
        <a href="creator.html" class="text-gray-700 hover:text-indigo-600 font-medium transition-colors border-b-2 border-indigo-600">Creator</a>
        <a href="Attraction.html" class="text-gray-700 hover:text-indigo-600 font-medium transition-colors">Gallery</a>
      </nav>
      
      <!-- User Actions -->
      <div class="flex items-center space-x-3">
        <button id="userBtn" class="flex items-center space-x-2 text-gray-700 hover:text-indigo-600 transition-colors">
          <i class="fas fa-user-circle text-xl"></i>
          <span class="hidden md:inline font-medium" id="userDisplay">Sign In</span>
        </button>
        <a href="signup.html" class="hidden md:inline-flex items-center px-4 py-2 bg-indigo-600 text-white rounded-full hover:bg-indigo-700 transition-colors">
          <i class="fas fa-user-plus mr-2"></i>
          Sign Up
        </a>
        <button id="logoutBtn" class="hidden md:inline-flex items-center px-4 py-2 bg-gray-100 text-gray-700 rounded-full hover:bg-gray-200 hover:text-gray-900 transition-colors">
          <i class="fas fa-sign-out-alt mr-2"></i>
          Logout
        </button>
        <button id="mobileMenuBtn" class="md:hidden p-2 text-gray-700 hover:text-indigo-600">
          <i class="fas fa-bars text-xl"></i>
        </button>
      </div>
    </div>
    
    <!-- Mobile Navigation -->
    <div id="mobileMenu" class="md:hidden bg-white border-t border-gray-200 hidden">
      <div class="container mx-auto px-4 py-4 space-y-4">
        <nav class="flex flex-col space-y-2">
          <a href="index.html" class="text-gray-700 hover:text-indigo-600 font-medium py-2 px-4 rounded transition-colors">Home</a>
          <a href="trending.html" class="text-gray-700 hover:text-indigo-600 font-medium py-2 px-4 rounded transition-colors">Trending</a>
          <a href="artworks.html" class="text-gray-700 hover:text-indigo-600 font-medium py-2 px-4 rounded transition-colors">Artworks</a>
          <a href="creator.html" class="text-gray-700 hover:text-indigo-600 font-medium py-2 px-4 rounded transition-colors bg-indigo-50">Creator</a>
          <a href="Attraction.html" class="text-gray-700 hover:text-indigo-600 font-medium py-2 px-4 rounded transition-colors">Gallery</a>
        </nav>
      </div>
    </div>
  </header>

  <!-- ☁️ Cloudinary Configuration (Replace with your actual credentials) -->
  <script>
    // Cloudinary Configuration - Your actual credentials
    const CLOUDINARY_CLOUD_NAME = 'dd6ons4ie';
    const CLOUDINARY_UPLOAD_PRESET = 'Artify';
    
    // Update the Cloudinary config function
    function updateCloudinaryConfig() {
      if (typeof getCloudinaryConfig === 'function') {
        // Override the default Cloudinary config
        window.getCloudinaryConfig = function() {
          return {
            cloudName: CLOUDINARY_CLOUD_NAME,
            uploadPreset: CLOUDINARY_UPLOAD_PRESET
          };
        };
        
        // Also update the validation function
        window.validateCloudinaryConfig = function(cloudName, uploadPreset) {
          if (!cloudName || cloudName === 'YOUR_CLOUD_NAME') {
            console.error('Cloudinary cloud name is not configured');
            return false;
          }
          
          if (!uploadPreset || uploadPreset === 'YOUR_UPLOAD_PRESET') {
            console.error('Cloudinary upload preset is not configured');
            return false;
          }
          
          return true;
        };
      }
    }
    
    // Call this when the page loads
    document.addEventListener('DOMContentLoaded', function() {
      updateCloudinaryConfig();
      console.log('Cloudinary configuration loaded');
    });
  </script>

  <!-- 🎨 Flex Container with Left/Center/Right (Equal Heights) -->
  <div class="flex flex-col md:flex-row items-stretch justify-center mt-10 w-full max-w-6xl space-y-6 md:space-y-0 md:space-x-6 h-[700px]">

    <!-- Left Image -->
    <div class="hidden md:block w-1/2 h-full">
      <img src="https://img.freepik.com/free-photo/beautiful-vintage-collage-composition_23-2149479769.jpg?ga=GA1.1.1537067850.1744021227&semt=ais_country_boost&w=740" alt="Left Art" class="rounded-2xl shadow-xl object-cover w-full h-full">
    </div>

    <!-- Upload Form -->
    <div class="w-full md:w-1/2 bg-white p-8 rounded-2xl shadow-xl h-full overflow-y-auto">
      <h2 class="text-2xl font-bold mb-6 text-center text-indigo-600">Upload Your Own Art</h2>

      <div id="drop-zone" class="flex flex-col items-center justify-center border-2 border-dashed border-indigo-400 rounded-xl p-6 cursor-pointer hover:bg-indigo-50 transition">
        <svg class="w-12 h-12 text-indigo-400 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0l-4 4m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/>
        </svg>
        <p class="text-gray-500">Click to upload or drag and drop</p>
        <p class="text-xs text-gray-400 mt-1">PNG, JPG up to 5MB</p>
        <input id="fileInput" type="file" accept="image/*" class="hidden" />
      </div>

      <div id="preview" class="mt-6 hidden">
        <img id="previewImg" src="#" alt="Preview" class="w-full h-auto rounded-lg shadow mb-4" />
      </div>

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Artwork Title</label>
        <input type="text" id="artTitle" placeholder="e.g., Sunset Overdrive" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-400 focus:outline-none" />
      </div>

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
        <textarea id="artDescription" placeholder="Tell us something about your art..." rows="3" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-400 focus:outline-none resize-none"></textarea>
      </div>

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Enter the Price for your Art Work (₹)</label>
        <input type="number" id="artPrice" placeholder="e.g., 120" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-400 focus:outline-none" />
      </div>

      <button id="submitBtn" class="w-full bg-indigo-500 text-white py-2 rounded-lg hover:bg-indigo-600 transition">
        Submit Artwork
      </button>
    </div>

    <!-- Right Image -->
    <div class="hidden md:block w-1/2 h-full">
      <img src="https://img.freepik.com/premium-photo/village-scene-with-guru-imparting-wisdom-background_987764-133354.jpg?ga=GA1.1.1537067850.1744021227&semt=ais_country_boost&w=740" alt="Right Art" class="rounded-2xl shadow-xl object-cover w-full h-full">
    </div>
  </div>

  <!-- Display Submitted Artwork -->
  <div id="submittedDisplay" class="max-w-md w-full mt-10 hidden bg-white p-6 rounded-2xl shadow-lg">
    <h3 class="text-xl font-bold text-indigo-600 mb-4">Your Submitted Artwork</h3>
    <img id="finalImage" src="#" class="w-full rounded-lg mb-4 shadow" />
    <h4 id="finalTitle" class="text-lg font-semibold text-gray-800 mb-1"></h4>
    <p id="finalDesc" class="text-gray-600 text-sm"></p>
    <p id="finalPrice" class="text-gray-800 text-sm font-semibold"></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  <script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const previewImg = document.getElementById('previewImg');
    const submitBtn = document.getElementById('submitBtn');
    const submitBtnOriginal = submitBtn.textContent;

    const artTitle = document.getElementById('artTitle');
    const artDescription = document.getElementById('artDescription');
    const artPrice = document.getElementById('artPrice');

    const finalImage = document.getElementById('finalImage');
    const finalTitle = document.getElementById('finalTitle');
    const finalDesc = document.getElementById('finalDesc');
    const finalPrice = document.getElementById('finalPrice');

    const submittedDisplay = document.getElementById('submittedDisplay');

    let imageData = '';
    let selectedFile = null;

    dropZone.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (file && file.type.startsWith('image/')) {
        selectedFile = file;
        const reader = new FileReader();
        reader.onload = e => {
          imageData = e.target.result;
          previewImg.src = imageData;
          preview.classList.remove('hidden');
        };
        reader.readAsDataURL(file);
      }
    });

    dropZone.addEventListener('dragover', e => {
      e.preventDefault();
      dropZone.classList.add('bg-indigo-100');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('bg-indigo-100');
    });

    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('bg-indigo-100');
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) {
        selectedFile = file;
        const reader = new FileReader();
        reader.onload = e => {
          imageData = e.target.result;
          previewImg.src = imageData;
          preview.classList.remove('hidden');
        };
        reader.readAsDataURL(file);
      }
    });

    async function configureUI(user) {
      if (!user) {
        submitBtn.disabled = true;
        submitBtn.textContent = 'Sign in to upload';
        // Check if login link already exists to avoid duplicates
        if (!document.getElementById('loginLinkCreator')) {
          const loginLink = document.createElement('a');
          loginLink.id = 'loginLinkCreator';
          loginLink.href = 'login.html';
          loginLink.className = 'text-indigo-600 font-medium ml-2';
          loginLink.textContent = 'Sign in';
          submitBtn.parentElement.appendChild(loginLink);
        }
      } else {
        submitBtn.disabled = false;
        submitBtn.textContent = submitBtnOriginal; // Restore original text
        const existingLoginLink = document.getElementById('loginLinkCreator');
        if (existingLoginLink) {
          existingLoginLink.remove();
        }
      }
    }

    // Register for auth changes
    onAuthStateChange((user) => {
      console.log("Creator page auth change:", user);
      configureUI(user);
    });

    document.addEventListener('DOMContentLoaded', async () => {
      // The onAuthStateChange above handles initial UI via cached localStorage
      // But we still call checkUserSession to verify with Supabase
      const user = await checkUserSession();
      configureUI(user);
    });

    submitBtn.addEventListener('click', async () => {
      const user = await checkUserSession(); // Final check before upload
      if (!user) {
        alert('Please sign in to upload your artwork.');
        configureUI(null);
        return;
      }

      const title = artTitle.value.trim();
      const desc = artDescription.value.trim();
      const price = artPrice.value.trim();

      if (!imageData || !title || !desc || !price) {
        alert("Please complete all fields and upload an image.");
        return;
      }

      submittedDisplay.classList.remove('hidden');

      try {
        console.log('Starting artwork upload process...');
        
        // Use the enhanced upload function with fallback
        const result = await uploadArtworkWithFallback(title, desc, price, imageData, selectedFile);
        
        if (result.success) {
          alert('Artwork submitted successfully!');
          finalImage.src = result.imageUrl;
          
          // Reset form
          artTitle.value = '';
          artDescription.value = '';
          artPrice.value = '';
          preview.classList.add('hidden');
          fileInput.value = '';
          imageData = '';
          selectedFile = null;
        } else {
          alert('Upload failed. Please try again.');
        }
      } catch (error) {
        console.error('Upload process failed:', error);
        alert('Upload failed: ' + error.message + '\n\nPlease check your connection and try again.');
      }
    });

    // Mobile menu toggle
    document.getElementById('mobileMenuBtn').addEventListener('click', function() {
      document.getElementById('mobileMenu').classList.toggle('hidden');
    });

    // Enhanced upload function with Cloudinary support
    async function uploadArtworkWithFallback(title, description, price, imageData, selectedFile) {
      try {
        const supabase = await initSupabase();
        if (!supabase) {
          throw new Error('Supabase is not configured');
        }

        const user = await checkUserSession();
        if (!user) {
          throw new Error('User not authenticated');
        }

        // First, try Cloudinary upload (preferred method)
        try {
          console.log('Attempting Cloudinary upload...');
          
          // Check if Cloudinary is configured
          const cloudinaryConfig = getCloudinaryConfig();
          if (!validateCloudinaryConfig(cloudinaryConfig.cloudName, cloudinaryConfig.uploadPreset)) {
            console.warn('Cloudinary not configured properly, falling back to Supabase storage');
            throw new Error('Cloudinary configuration missing');
          }
          
          console.log('Using Cloudinary cloud:', cloudinaryConfig.cloudName);
          
          // Upload to Cloudinary
          let imageUrl;
          if (selectedFile) {
            // Upload file directly
            imageUrl = await uploadToCloudinary(selectedFile, cloudinaryConfig.cloudName, cloudinaryConfig.uploadPreset);
          } else if (imageData) {
            // Upload base64 data
            imageUrl = await uploadBase64ToCloudinary(imageData, cloudinaryConfig.cloudName, cloudinaryConfig.uploadPreset);
          } else {
            throw new Error('No file or image data provided');
          }
          
          console.log('Cloudinary upload successful:', imageUrl);
          
          // Insert into database with Cloudinary URL
          const { data: dbData, error: dbError } = await supabase
            .from('artworks')
            .insert([{
              title,
              description: description,
              price: parseFloat(price),
              image_url: imageUrl,
              category: 'digital',
              artist_id: user.id,
              storage_provider: 'cloudinary' // Track storage provider
            }]);

          if (dbError) {
            console.error('Database insert error:', dbError);
            throw new Error(`Database insert failed: ${dbError.message}`);
          }
          
          console.log('Database insert successful with Cloudinary URL');
          return { success: true, imageUrl: imageUrl, provider: 'cloudinary' };
          
        } catch (cloudinaryError) {
          console.error('Cloudinary upload failed:', cloudinaryError);
          console.log('Falling back to Supabase storage...');
          
          // Fallback: Try Supabase storage upload
          return await uploadWithSupabaseStorage(title, description, price, imageData, selectedFile, supabase, user);
        }
        
      } catch (error) {
        console.error('All upload methods failed:', error);
        throw error;
      }
    }

    // Separate function for Supabase storage upload (fallback)
    async function uploadWithSupabaseStorage(title, description, price, imageData, selectedFile, supabase, user) {
      try {
        console.log('Attempting Supabase storage upload (fallback)...');
        
        // Check if storage bucket exists
        try {
          const { data: buckets } = await supabase.storage.listBuckets();
          const artworksBucket = buckets?.find(b => b.name === 'artworks');
          
          if (!artworksBucket) {
            console.warn('Artworks bucket not found, but continuing with upload attempt');
          } else {
            console.log('✅ Artworks bucket found:', artworksBucket);
          }
        } catch (bucketError) {
          console.warn('Could not list buckets, but continuing with upload:', bucketError.message);
        }
        
        const fileName = `${Date.now()}-${(selectedFile?.name || 'image').replace(/[^a-zA-Z0-9._-]/g, '')}`;
        const uploadPath = `uploads/${fileName}`;
        
        console.log('Uploading to Supabase path:', uploadPath);
        
        // Get current session for authentication
        const { data: { session } } = await supabase.auth.getSession();
        if (!session) {
          throw new Error('No active session for storage upload');
        }
        
        // Upload to Supabase storage
        const { error: upError } = await supabase.storage.from('artworks').upload(uploadPath, selectedFile, {
          contentType: selectedFile?.type || 'image/jpeg',
          upsert: false,
          cacheControl: '3600'
        });
        
        if (upError) {
          console.error('Supabase storage upload error:', upError);
          throw new Error(`Supabase storage upload failed: ${upError.message}`);
        }
        
        console.log('Supabase storage upload successful');
        
        // Get public URL
        const { data: pub } = supabase.storage.from('artworks').getPublicUrl(uploadPath);
        const publicUrl = pub?.publicUrl || '';
        if (!publicUrl) {
          throw new Error('Failed to get public URL from Supabase');
        }
        
        console.log('Got Supabase public URL:', publicUrl);
        
        // Insert into database with Supabase URL
        const { data: dbData, error: dbError } = await supabase
          .from('artworks')
          .insert([{
            title,
            description: description,
            price: parseFloat(price),
            image_url: publicUrl,
            category: 'digital',
            artist_id: user.id,
            storage_provider: 'supabase' // Track storage provider
          }]);

        if (dbError) {
          console.error('Database insert error:', dbError);
          throw new Error(`Database insert failed: ${dbError.message}`);
        }
        
        console.log('Database insert successful with Supabase URL');
        return { success: true, imageUrl: publicUrl, provider: 'supabase' };
        
      } catch (storageError) {
        console.error('Supabase storage upload failed:', storageError);
        
        // Final fallback: Try server-side upload with base64
        return await uploadWithServerSideFallback(title, description, price, imageData, supabase, user);
      }
    }

    // Final fallback: Server-side upload
    async function uploadWithServerSideFallback(title, description, price, imageData, supabase, user) {
      console.log('Attempting server-side upload (final fallback)...');
      
      const response = await fetch('/api/upload-artwork', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${(await supabase.auth.getSession()).data.session.access_token}`
        },
        body: JSON.stringify({
          title,
          description,
          price: parseFloat(price),
          image_url: imageData, // Use base64 data URL
          category: 'digital'
        })
      });
      
      if (!response.ok) {
        let errorMessage = `Server upload failed with status: ${response.status}`;
        try {
          const errorData = await response.json();
          errorMessage += ` - ${errorData.error || 'Unknown error'}`;
        } catch (e) {
          errorMessage += ' - Invalid response format';
        }
        throw new Error(errorMessage);
      }
      
      let result;
      try {
        result = await response.json();
      } catch (e) {
        throw new Error('Invalid JSON response from server');
      }
      
      console.log('Server-side upload successful');
      return { success: true, imageUrl: imageData, provider: 'server' };
    }
  </script>
</body>
</html>
